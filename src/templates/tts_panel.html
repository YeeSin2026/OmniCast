{# tts_panel.html — 口播音频面板 HTMX 片段，嵌入在草稿详情页 #}

<div id="tts-section" class="bg-white dark:bg-zinc-900 rounded-xl border border-zinc-200 dark:border-zinc-800 shadow-2d p-5 mb-5">
    <div class="flex items-center justify-between mb-3">
        <h2 class="text-[14px] font-semibold text-zinc-700 dark:text-zinc-200">🎙️ 口播音频</h2>
        {% if draft_text_len %}
        <span class="text-[10px] text-zinc-400 dark:text-zinc-500">{{ draft_text_len }} 字文案</span>
        {% endif %}
    </div>

    <!-- TTS 任务状态 + 动态内容统一放在此容器内，HTMX 替换时不会残留旧元素 -->
    <div id="tts-status">
        {% if not speaker_configured %}
        <!-- 未配置声音样本 -->
        <div class="text-center py-4">
            <p class="text-[13px] text-zinc-500 dark:text-zinc-400 mb-3">
                尚未配置你的声音样本，无法生成口播音频。
            </p>
            <a href="/agent/speaker"
               class="inline-block px-4 py-2 bg-zinc-100 dark:bg-zinc-800 text-zinc-700 dark:text-zinc-200
                      text-[12px] rounded-lg hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors">
                🎤 上传声音样本
            </a>
        </div>

        {% elif has_audio %}
        <!-- 已有音频 — 显示播放器 -->
        <div class="flex items-center gap-3 flex-wrap">
            <audio controls preload="metadata" class="h-10 max-w-[280px]">
                <source src="/api/agent/draft/{{ draft_id }}/audio/{{ audio_filename }}" type="audio/wav">
            </audio>
            <span class="text-[11px] text-emerald-600 dark:text-emerald-400">音频已生成</span>
            <button hx-post="/api/agent/draft/{{ draft_id }}/tts"
                    hx-target="#tts-status"
                    hx-swap="outerHTML"
                    class="text-[11px] px-3 py-1.5 bg-zinc-100 dark:bg-zinc-800 text-zinc-500
                           dark:text-zinc-400 rounded-lg hover:bg-zinc-200 dark:hover:bg-zinc-700
                           transition-colors">
                🔄 重新生成
            </button>
            <button hx-delete="/api/agent/draft/{{ draft_id }}/audio"
                    hx-target="#tts-section"
                    hx-swap="outerHTML"
                    hx-confirm="确定删除这条口播音频吗？"
                    class="text-[11px] px-3 py-1.5 bg-red-50 dark:bg-red-900/20 text-red-500
                           dark:text-red-400 rounded-lg hover:bg-red-100 dark:hover:bg-red-900/30
                           transition-colors">
                🗑 删除
            </button>
        </div>

        {% else %}
        <!-- 已配置声音但无音频 — 生成按钮 -->
        <div class="text-center py-3">
            <button hx-post="/api/agent/draft/{{ draft_id }}/tts"
                    hx-target="#tts-status"
                    hx-swap="outerHTML"
                    class="px-5 py-2.5 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900
                           text-[13px] font-medium rounded-lg hover:opacity-90 transition-opacity">
                🎤 生成口播音频
            </button>
            <p class="text-[11px] text-zinc-400 dark:text-zinc-500 mt-2">
                将使用你的克隆声音朗读这篇文案（耗时约 10-30 秒）
            </p>
        </div>
        {% endif %}
    </div>
</div>
