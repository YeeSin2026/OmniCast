<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初始配置 — OmniCast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
                    },
                }
            }
        };
    </script>
</head>
<body class="min-h-screen bg-zinc-50 dark:bg-zinc-950 flex items-center justify-center p-6">
    <div class="w-full max-w-lg">
        <div class="text-center mb-8">
            <h1 class="text-[24px] font-bold text-zinc-900 dark:text-zinc-100">OmniCast</h1>
            <p class="text-[14px] text-zinc-500 dark:text-zinc-400 mt-1">初始配置</p>
        </div>

        <div class="bg-white dark:bg-zinc-900 rounded-xl border border-zinc-200 dark:border-zinc-800 shadow-2d p-6">
            {% if not activated %}
            <div class="bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-lg p-3 mb-4">
                <p class="text-[13px] text-amber-600 dark:text-amber-400">请先完成激活再配置。激活页面仍在运行中。</p>
            </div>
            {% endif %}

            <form id="setup-form" onsubmit="saveConfig(event)">
                <!-- LLM API Key -->
                <div class="mb-4">
                    <label class="text-[13px] font-medium text-zinc-700 dark:text-zinc-300 block mb-1.5">
                        LLM API Key <span class="text-red-400">*</span>
                    </label>
                    <input type="password" id="llm-api-key" name="LLM_API_KEY"
                           value="{{ config.LLM_API_KEY or '' }}"
                           placeholder="sk-..."
                           class="w-full px-3 py-2 text-[13px] font-mono bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg outline-none focus:border-zinc-400 dark:focus:border-zinc-500 text-zinc-800 dark:text-zinc-200 placeholder-zinc-400 transition-colors">
                    <p class="text-[10px] text-zinc-400 mt-1">DeepSeek API Key，从 platform.deepseek.com 获取</p>
                </div>

                <!-- LLM Base URL -->
                <div class="mb-4">
                    <label class="text-[13px] font-medium text-zinc-700 dark:text-zinc-300 block mb-1.5">LLM 服务地址</label>
                    <input type="text" name="LLM_BASE_URL"
                           value="{{ config.LLM_BASE_URL or 'https://api.deepseek.com' }}"
                           class="w-full px-3 py-2 text-[13px] font-mono bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg outline-none focus:border-zinc-400 dark:focus:border-zinc-500 text-zinc-800 dark:text-zinc-200 transition-colors">
                </div>

                <!-- LLM Model -->
                <div class="mb-4">
                    <label class="text-[13px] font-medium text-zinc-700 dark:text-zinc-300 block mb-1.5">模型</label>
                    <input type="text" name="LLM_MODEL"
                           value="{{ config.LLM_MODEL or 'deepseek-chat' }}"
                           class="w-full px-3 py-2 text-[13px] font-mono bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg outline-none focus:border-zinc-400 dark:focus:border-zinc-500 text-zinc-800 dark:text-zinc-200 transition-colors">
                </div>

                <!-- OmniVault URL -->
                <div class="mb-5">
                    <label class="text-[13px] font-medium text-zinc-700 dark:text-zinc-300 block mb-1.5">
                        OmniVault 地址
                        <span class="text-[10px] text-zinc-400 font-normal">（可选，视频深度采集需要）</span>
                    </label>
                    <input type="text" name="OMNIVAULT_API_URL"
                           value="{{ config.OMNIVAULT_API_URL or '' }}"
                           placeholder="http://localhost:8080"
                           class="w-full px-3 py-2 text-[13px] font-mono bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg outline-none focus:border-zinc-400 dark:focus:border-zinc-500 text-zinc-800 dark:text-zinc-200 placeholder-zinc-400 transition-colors">
                </div>

                <p id="error-msg" class="text-[12px] text-red-500 dark:text-red-400 mb-3 hidden"></p>
                <p id="success-msg" class="text-[12px] text-emerald-600 dark:text-emerald-400 mb-3 hidden"></p>

                <button type="submit"
                        class="w-full py-2.5 bg-zinc-900 dark:bg-white dark:text-zinc-900 text-white text-[14px] font-medium rounded-lg hover:bg-zinc-800 dark:hover:bg-zinc-200 transition-colors">
                    保存配置
                </button>
            </form>

            <p class="text-[11px] text-zinc-400 dark:text-zinc-500 mt-4 text-center">
                配置保存到 /data/config.json，重启后仍然有效
            </p>
        </div>
    </div>

    <script>
    async function saveConfig(e) {
        e.preventDefault();
        var errorEl = document.getElementById('error-msg');
        var successEl = document.getElementById('success-msg');
        errorEl.classList.add('hidden');
        successEl.classList.add('hidden');

        var apiKey = document.getElementById('llm-api-key').value.trim();
        if (!apiKey) {
            errorEl.textContent = 'LLM API Key 不能为空';
            errorEl.classList.remove('hidden');
            return;
        }

        var form = document.getElementById('setup-form');
        var formData = new FormData(form);
        var data = {};
        formData.forEach(function(v, k) { data[k] = v; });

        try {
            var resp = await fetch('/api/setup', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            var result = await resp.json();
            if (result.ok) {
                successEl.textContent = '配置已保存，即将跳转…';
                successEl.classList.remove('hidden');
                setTimeout(function() { window.location.href = '/'; }, 800);
            } else {
                errorEl.textContent = result.error || '保存失败';
                errorEl.classList.remove('hidden');
            }
        } catch (err) {
            errorEl.textContent = '网络错误，请重试';
            errorEl.classList.remove('hidden');
        }
    }
    </script>
</body>
</html>
