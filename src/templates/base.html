<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OmniCast{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
                    },
                    boxShadow: {
                        '2d': '0 1px 2px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.08)',
                        '2d-hover': '0 2px 4px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.12)',
                    },
                }
            }
        };
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        html { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #f5f5f7; }
        .dark body { background: #09090b; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 2px; }
        .dark ::-webkit-scrollbar-thumb { background: #3f3f46; }

        .entry-content h1 { font-size: 1.15rem; font-weight: 700; margin: 0.75rem 0 0.5rem; color: #18181b; }
        .entry-content h2 { font-size: 1.05rem; font-weight: 600; margin: 0.5rem 0 0.5rem; padding-bottom: 0.25rem; border-bottom: 1px solid #e4e4e7; color: #27272a; }
        .entry-content h3 { font-size: 0.95rem; font-weight: 600; margin: 0.5rem 0 0.25rem; color: #3f3f46; }
        .entry-content p { margin: 0.5rem 0; }
        .entry-content blockquote { border-left: 3px solid #d4d4d8; padding-left: 0.75rem; margin: 0.5rem 0; color: #71717a; }
        .entry-content ul, .entry-content ol { margin: 0.5rem 0; padding-left: 1.5rem; }
        .entry-content li { margin: 0.25rem 0; }
        .entry-content strong { font-weight: 600; }
        .entry-content code { font-size: 0.85em; background: #f4f4f5; padding: 1px 4px; border-radius: 3px; }

        .dark .entry-content h1 { color: #e4e4e7; }
        .dark .entry-content h2 { border-bottom-color: #27272a; color: #d4d4d8; }
        .dark .entry-content h3 { color: #a1a1aa; }
        .dark .entry-content blockquote { border-left-color: #52525b; color: #a1a1aa; }
        .dark .entry-content code { background: #27272a; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="bg-white/90 dark:bg-zinc-900/90 backdrop-blur-md border-b border-zinc-200 dark:border-zinc-800 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-1">
                <a href="/" class="text-[15px] font-bold text-zinc-900 dark:text-zinc-200 mr-6 hover:opacity-80 transition-opacity">OmniCast</a>
                <a href="/agent"
                   class="text-[13px] px-3 py-2 rounded-lg transition-colors
                          {% if request.url.path == '/agent' or request.url.path == '/' %}
                          bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-200 font-medium
                          {% else %}
                          text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-800 hover:text-zinc-800 dark:hover:text-zinc-300
                          {% endif %}">
                    内容工厂
                </a>
                <a href="/agent/drafts"
                   class="text-[13px] px-3 py-2 rounded-lg transition-colors
                          {% if '/drafts' in request.url.path %}
                          bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-200 font-medium
                          {% else %}
                          text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-800 hover:text-zinc-800 dark:hover:text-zinc-300
                          {% endif %}">
                    草稿审核
                </a>
                <a href="/agent/speaker"
                   class="text-[13px] px-3 py-2 rounded-lg transition-colors
                          {% if '/speaker' in request.url.path %}
                          bg-zinc-100 dark:bg-zinc-800 text-zinc-900 dark:text-zinc-200 font-medium
                          {% else %}
                          text-zinc-600 dark:text-zinc-400 hover:bg-zinc-50 dark:hover:bg-zinc-800 hover:text-zinc-800 dark:hover:text-zinc-300
                          {% endif %}">
                    语音克隆
                </a>
            </div>
            <button onclick="document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', document.documentElement.classList.contains('dark')?'dark':'light')"
                    class="text-[13px] text-zinc-500 dark:text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-200 p-2 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
                🌓
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-6">
        {% block content %}{% endblock %}
    </main>

    <script>
        // 时区自适应：将所有时间转为用户本地时间（服务器均为 UTC）
        function localizeTimestamps(scope) {
            scope = scope || document;
            scope.querySelectorAll('time[datetime]').forEach(function(el) {
                var dt = el.getAttribute('datetime');
                // 无时区后缀的视为 UTC
                if (!/[Zz]$/.test(dt) && !/[+-]\d{2}:\d{2}$/.test(dt)) {
                    dt += 'Z';
                }
                var d = new Date(dt);
                if (isNaN(d)) return;
                el.textContent = d.toLocaleString();
            });
        }
        document.addEventListener('DOMContentLoaded', function() { localizeTimestamps(); });
        document.addEventListener('htmx:afterSwap', function(e) { localizeTimestamps(e.detail.target); });
    </script>
</body>
</html>
